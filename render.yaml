services:
  - type: web
    name: workforce-lms-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: UPLOAD_ROOT
        value: /var/data/uploads
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SEED_NAME
        sync: false
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: ADMIN_SEED_EMPLOYEE_ID
        sync: false
    disk:
      name: workforce-lms-uploads
      mountPath: /var/data
      sizeGB: 1
